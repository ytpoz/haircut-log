<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haircut Log - 散髪周期管理</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col items-center justify-center p-4 md:p-8 antialiased">

    <main class="w-full max-w-md md:max-w-3xl lg:max-w-4xl bg-white rounded-3xl shadow-xs border border-slate-100 p-6 md:p-8 my-4 flex flex-col gap-6 md:gap-8 transition-all duration-300">
        
        <header class="text-center md:border-b md:border-slate-100 md:pb-4">
            <h1 class="text-xl md:text-2xl font-bold tracking-tight text-slate-900 flex items-center justify-center gap-2">
                <i data-lucide="scissors" class="w-5 h-5 md:w-6 md:h-6 text-indigo-600"></i>
                Haircut Log
            </h1>
            <p class="text-xs md:text-sm text-slate-400 mt-1">散髪のタイミングをスマートに管理（クラウド同期）</p>
        </header>

        <div class="flex flex-col gap-8 md:grid md:grid-cols-2 md:gap-8 md:items-start">
            
            <div class="flex flex-col gap-6 md:gap-8">
                <section class="flex flex-col items-center justify-center py-2 md:py-4">
                    <button id="log-btn" class="w-40 h-40 md:w-44 md:h-44 rounded-full bg-indigo-600 text-white font-bold text-lg shadow-lg shadow-indigo-200 hover:bg-indigo-700 active:scale-95 transition-all duration-200 cursor-pointer flex flex-col items-center justify-center gap-2 border-4 border-white ring-4 ring-indigo-50">
                        <i data-lucide="calendar-plus" class="w-8 h-8 md:w-9 md:h-9"></i>
                        <span>散髪した！</span>
                    </button>
                </section>

                <section class="grid grid-cols-2 gap-4">
                    <div class="bg-indigo-50/50 p-4 rounded-2xl border border-indigo-50 flex flex-col gap-1">
                        <span class="text-xs font-medium text-indigo-600 flex items-center gap-1">
                            <i data-lucide="clock" class="w-3.5 h-3.5"></i> 前回からの経過
                        </span>
                        <p class="text-2xl md:text-3xl font-bold text-slate-900"><span id="days-since">--</span> <span class="text-sm font-normal text-slate-500">日</span></p>
                    </div>
                    <div class="bg-emerald-50/50 p-4 rounded-2xl border border-emerald-50 flex flex-col gap-1">
                        <span class="text-xs font-medium text-emerald-600 flex items-center gap-1">
                            <i data-lucide="activity" class="w-3.5 h-3.5"></i> 平均周期
                        </span>
                        <p class="text-2xl md:text-3xl font-bold text-slate-900"><span id="average-cycle">--</span> <span class="text-sm font-normal text-slate-500">日</span></p>
                    </div>
                </section>
            </div>

            <section class="flex flex-col gap-3 h-full md:border-l md:border-slate-100 md:pl-8">
                <h2 class="text-sm font-bold text-slate-900 flex items-center gap-1.5 px-1">
                    <i data-lucide="history" class="w-4 h-4 text-slate-500"></i>
                    過去の履歴
                </h2>
                <div class="border border-slate-100 rounded-2xl overflow-hidden bg-slate-50/30 max-h-60 md:max-h-[320px] overflow-y-auto">
                    <ul id="history-list" class="divide-y divide-slate-100">
                        </ul>
                </div>
            </section>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, getDocs } from "
